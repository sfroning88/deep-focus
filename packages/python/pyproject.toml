[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "focus_python"
version = "0.0.1"
description = "Shared core, FastAPI helpers, enums, services, and utils for Focus Python apps"
requires-python = ">=3.13"
dependencies = [
  "python-dotenv>=1.0.0",
  "psycopg2-binary>=2.9.0",
  "structlog>=24.0.0",
  "redis>=5.0.0",
  "rq>=2.0.0",
  "fastapi>=0.100.0",
  "requests>=2.31.0",
  "boto3>=1.34.0",
  "joblib>=1.3.0",
  "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
  "black>=24.0.0",
  "ruff>=0.4.0",
]

[tool.setuptools.packages.find]
where = ["src"]
