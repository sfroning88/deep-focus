previews:
  generation: off
services:
- type: web
  runtime: docker
  name: focus-backend-api
  plan: starter
  numInstances: 1
  dockerfilePath: apps/backend/Dockerfile
  buildFilter:
    paths:
      - apps/backend/**
      - packages/python/**
  envVars:
    - fromGroup: Focus-Environment
    - key: BACKEND_API_URL
      value: https://focus-backend-api.onrender.com
      previewValue: https://focus-backend-api-staging.onrender.com
    - key: AI_API_URL
      value: https://focus-ai-api.onrender.com
      previewValue: https://focus-ai-api-staging.onrender.com
    - key: JOB_DOMAIN
      value: predictions
