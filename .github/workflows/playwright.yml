name: Playwright CI

on:
    pull_request:
        branches: [main, master]
        paths:
        - "apps/dashboard/**"

jobs:
    playwright:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            pull-requests: write
            issues: write
        steps:
        -   name: Check out code
            uses: actions/checkout@v4
            with:
                fetch-depth: 0
        
        -   name: Setup PNPM
            uses: pnpm/action-setup@v4
        
        -   uses: actions/setup-node@v4
            with:
                node-version: "20"
                cache: "pnpm"

        -   name: Install dependencies
            run: pnpm install --frozen-lockfile

        -   name: Generate Prisma Client
            run: pnpm --filter @focus/db run db:generate

        -   name: Build portal
            run: pnpm --filter @focus/dashboard build
            env:
                CI: true
                DATABASE_URL: ${{ secrets.DATABASE_URL }}
                DIRECT_URL: ${{ secrets.DIRECT_URL }}
                NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

        -   name: Install Chromium
            run: pnpm --filter @focus/dashboard exec playwright install chromium --with-deps

        -   name: Run smoke tests
            id: smoke
            run: pnpm --filter @focus/dashboard test:e2e
            continue-on-error: true
            env:
                CI: true
                DATABASE_URL: ${{ secrets.DATABASE_URL }}
                DIRECT_URL: ${{ secrets.DIRECT_URL }}
                NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
                PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
                PLAYWRIGHT_EMAIL: ${{ secrets.PLAYWRIGHT_EMAIL }}
                PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}

        -   name: Summarize results
            if: always() && github.event_name == 'pull_request'
            run: bash scripts/summarize-playwright-results.sh apps/dashboard/playwright-report/results.json /tmp/playwright-results.txt

        -   name: Post PR comment
            if: always() && github.event_name == 'pull_request'
            uses: actions/github-script@v7
            with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                    await require('./scripts/post-playwright-comment.js')({ github, context });

        -   name: Fail if smoke tests failed
            if: steps.smoke.outcome == 'failure'
            run: exit 1

        -   name: Upload report artifact
            if: always()
            uses: actions/upload-artifact@v4
            with:
                name: playwright-report
                path: apps/dashboard/playwright-report/
                retention-days: 3