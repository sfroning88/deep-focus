name: Render Deploy Status

on:
  pull_request:
    branches: [main, master]
    paths:
      - "apps/backend/**"
      - "apps/ai/**"
      - "scripts/diff-python-check.sh"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            ai:
              - 'apps/ai/**'

  render-focus-backend-api:
    name: Render (focus-backend-api)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        uses: bounceapp/render-action@667d896d04b8d9f8c3b1263970efae0948ab0da5
        continue-on-error: true
        with:
          render-token: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_BACKEND_API_ID }}
          retries: 3
          wait: 10000

  render-focus-ai-api:
    name: Render (focus-ai-api)
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        uses: bounceapp/render-action@667d896d04b8d9f8c3b1263970efae0948ab0da5
        continue-on-error: true
        with:
          render-token: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_AI_API_ID }}
          retries: 3
          wait: 10000

  render-focus-ai-worker:
    name: Render (focus-ai-worker)
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        uses: bounceapp/render-action@667d896d04b8d9f8c3b1263970efae0948ab0da5
        continue-on-error: true
        with:
          render-token: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_AI_WORKER_ID }}
          retries: 5
          wait: 30000
