name: React Doctor

on:
  pull_request:
    branches: [main, master]
    paths:
      - "apps/dashboard/**"
      - "packages/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/**'

  react-doctor:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @focus/db run db:generate

      - name: Build project list
        id: projects
        run: |
          list=""
          [ "${{ needs.changes.outputs.dashboard }}" == "true" ] && list="${list}@focus/dashboard,"
          echo "projects=${list%,}" >> "$GITHUB_OUTPUT"

      # react-doctor embeds jsx-a11y/no-noninteractive-element-interactions; oxlint does not
      # implement that rule yet. oxlint 1.58+ rejects unknown plugin rules when parsing config
      # (oxc-project/oxc#20464), so ^1.47.0 resolves to a broken combo. Pin oxlint to 1.57.0.
      - name: Install React Doctor with pinned oxlint
        run: |
          mkdir -p /tmp/react-doctor-runner
          cd /tmp/react-doctor-runner
          npm init -y
          npm pkg set overrides.oxlint=1.57.0
          npm install react-doctor@0.0.29

      - name: Run React Doctor
        id: doctor
        run: |
          FLAGS="--fail-on error --verbose"
          FLAGS="$FLAGS --project ${{ steps.projects.outputs.projects }}"
          FLAGS="$FLAGS --diff ${{ github.base_ref }}"
          RD="/tmp/react-doctor-runner/node_modules/.bin/react-doctor"
          "$RD" . $FLAGS 2>&1 | tee /tmp/react-doctor-output.txt
          SCORE=$("$RD" . --score 2>/dev/null | tail -1 | tr -d '[:space:]')
          echo "score=${SCORE:-0}" >> "$GITHUB_OUTPUT"

      - name: Post filtered comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await require('./scripts/post-react-doctor-comment.js')({ github, context });

      - name: Print score
        run: echo "Health score ${{ steps.doctor.outputs.score }}"
