name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      actions: read

    env:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ey_placeholder
      NEXT_PUBLIC_POSTHOG_KEY: phc_ci_placeholder
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
      SUPABASE_SERVICE_ROLE_KEY: ey_placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm exec turbo run build --filter=@focus/dashboard

      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - deep-focus: deploy-with-vercel"
