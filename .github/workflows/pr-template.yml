name: PR Template

on:
  pull_request:
    types: [opened]

jobs:
  apply-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Assign author and add enhancement label
        uses: actions/github-script@v7
        with:
          script: |
            await require('./scripts/apply-pr-template.js')({ github, context });
